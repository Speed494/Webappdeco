<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Splash Screen Design */
        body {
            margin: 0;
            background-color: #121212; /* Dark Theme */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .loader {
            text-align: center;
        }

        /* Ek chota loading animation (Optional) */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader">
        <div class="spinner"></div>
        <h2>Developed By Decoded_191</h2>
        <p>Decoded Code Hub</p>
    </div>

    <script>
        // 3 seconds (3000ms) baad redirect karega
        setTimeout(function() {
            window.location.href = "second.html"; 
        }, 3000);
    </script>

</body>
</html>
