<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
  
  
  
<style>
    #matrix-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-color: black;
    }

    body {
        margin: 0;
        padding: 0;
        background-color: black;
        color: #00FF00;
        font-family: 'Courier New', monospace;
    }

    #hacker-terminal {
        position: relative;
        z-index: 10;
        padding: 20px;
        height: 60vh;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #00FF00;
        margin: 10px;
    }

    .navbar {
        background: #adff2f;
        padding: 15px;
        display: flex;
        justify-content: space-around;
        color: black;
        font-weight: bold;
    }

    .developer-section {
        text-align: center;
        padding: 20px;
        background: white;
        color: black;
        margin: 10px;
        border-radius: 10px;
    }
</style>
</head>

<canvas id="matrix-canvas"></canvas>

<div class="navbar">
    <span>Home</span>
    <span>About us</span>
    <span>Contact Us</span>
</div>

<div id="hacker-terminal"></div>

<div class="developer-section">
    <img src="https://via.placeholder.com/150" alt="Developer" style="border-radius: 50%; width: 100px;">
    <h2>Decoded 191</h2>
    <p>I am a passionate developer and modder.</p>
</div>

<script>
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Rain mein aapka naam aur keywords
const fallKeywords = ["decoded_191", "Access Granted", "Decrypting...", "Root Access", "System Override"];
const fontSize = 18;
const columns = canvas.width / 150;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = Math.random() * -50;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = fallKeywords[Math.floor(Math.random() * fallKeywords.length)];
        ctx.fillText(text, i * 180, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.7;
    }
}
setInterval(draw, 50);
</script>

<script type="py">
import asyncio
from pyscript import display

# Terminal mein aapka naam
keywords = [
    "User: decoded_191 Initializing...",
    "Bypassing Firewall...",
    "Access Granted",
    "Loading Code Snippets...",
    "System Ready!",
    "Prank Tha Real Nahi 😂"
]

async def run_sequence():
    for word in keywords:
        display(f"> {word}", target="hacker-terminal", append=True)
        await asyncio.sleep(1)

asyncio.ensure_future(run_sequence())
</script>
  
  
</body>
</html>
